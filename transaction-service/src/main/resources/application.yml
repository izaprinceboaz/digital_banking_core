server:
  port: 8083

spring:
  application:
    name: transaction-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/bk_transaction_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

services:
  account:
    base-url: ${ACCOUNT_SERVICE_URL:http://localhost:8082}
