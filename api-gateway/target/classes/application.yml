server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**,/api/auth/**

        - id: account-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/accounts/**,/api/statements/**

        - id: transaction-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/transactions/**,/api/transfer-limits/**

        - id: savings-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/savings-plans/**,/api/interest-records/**

        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/notifications/**,/api/notification-preferences/**
