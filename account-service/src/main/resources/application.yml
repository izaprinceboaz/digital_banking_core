server:
  port: 8082

spring:
  application:
    name: account-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/bk_account_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  sql:
    init:
      mode: always

jwt:
  secret: ${JWT_SECRET:digital-banking-core-super-secret-key-change-in-production-0123456789}
  enabled: true

services:
  notification:
    base-url: ${NOTIFICATION_SERVICE_BASE_URL:http://localhost:8085}
