server:
  port: 8084

spring:
  application:
    name: savings-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/bk_savings_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

services:
  account:
    base-url: ${ACCOUNT_SERVICE_URL:http://localhost:8082}
