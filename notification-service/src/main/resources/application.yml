server:
  port: 8085

spring:
  application:
    name: notification-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/bk_notification_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

services:
  auth:
    base-url: ${AUTH_SERVICE_URL:http://localhost:8081}

jwt:
  secret: ${JWT_SECRET:digital-banking-core-super-secret-key-change-in-production-0123456789}
  enabled: false
